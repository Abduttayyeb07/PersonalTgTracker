services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Bound to 127.0.0.1 only — reachable for local tools (GUI client,
      # `npm run db:migrate` from the host) but NEVER from the network, no
      # matter how the server's firewall is configured. The bot container
      # itself always talks to postgres over the internal Docker network on
      # 5432, unaffected by this mapping.
      - "127.0.0.1:48732:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Override host so the bot reaches the postgres service inside the network.
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
