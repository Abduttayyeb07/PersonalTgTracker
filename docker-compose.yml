services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker
      POSTGRES_DB: tracker
    ports:
      # Host 48732 -> container 5432. Deliberately a high, uncommon port so it
      # doesn't collide with any other Postgres/pgBouncer instance already
      # running on the server. Only needed if you want to reach the DB from
      # outside Docker (a GUI client, `npm run db:migrate` from the host, etc.) —
      # the bot container itself always talks to postgres over the internal
      # Docker network on 5432, unaffected by this mapping. Remove this whole
      # `ports:` block entirely for a tighter setup if you don't need that.
      - "48732:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker -d tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Override host so the bot reaches the postgres service inside the network.
      DATABASE_URL: postgres://tracker:tracker@postgres:5432/tracker
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
