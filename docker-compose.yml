services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker
      POSTGRES_DB: tracker
    ports:
      # Host 55432 -> container 5432, so `npm run dev` can reach it without
      # clashing with any native Postgres on the host (which may use 5432/5433).
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker -d tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Override host so the bot reaches the postgres service inside the network.
      DATABASE_URL: postgres://tracker:tracker@postgres:5432/tracker
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
