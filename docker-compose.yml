services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Bound to 127.0.0.1 only — reachable for local tools (GUI client,
      # `npm run db:migrate` from the host) but NEVER from the network, no
      # matter how the server's firewall is configured. The bot container
      # itself always talks to postgres over the internal Docker network on
      # 5432, unaffected by this mapping.
      - "127.0.0.1:48732:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Override host so the bot reaches the postgres service inside the network.
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:

networks:
  default:
    # An explicit subnet bypasses Docker's auto address-pool allocator
    # entirely — needed on servers with many existing networks, where that
    # pool (Docker's default 172.16.0.0/12) is often fully exhausted
    # ("all predefined address pools have been fully subnetted"). Using the
    # 10.x.x.x range instead, since that's rarely touched by Docker defaults.
    # If this still collides with something on your server, run
    # `docker network ls` + `docker network inspect <name>` to find a free /24.
    ipam:
      config:
        - subnet: 10.89.14.0/24
